name: Daily 591 Scraper

on:
  schedule:
    # 每天台灣時間 08:00 執行 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許手動觸發

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Scraper/Scraper.csproj

      - name: Build
        run: dotnet build src/Scraper/Scraper.csproj --no-restore -c Release

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: dotnet run --project src/Scraper/Scraper.csproj -c Release
